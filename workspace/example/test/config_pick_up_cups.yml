# Training Configuration for Wall-X Robotic Multi-Modal Learning
# This configuration supports multi-modal learning with vision, language, and action data

# Model and paths configuration
log_name: "github_stack_bowls"
log_project: "github_yangping_robochallenge_walloss_aloha"
model_type: qwen2_5

use_fast_tokenizer: false
# pretrained_wallx_path: "/path/to/qwen/"
action_tokenizer_path: "/x2robot_v2/Models/fast"
# action_tokenizer_type: 'fast'

# qwen_vl_act_config_path: "/path/to/qwen25_config.json"

processor_path: "/mnt/data/x2robot_v2/yangping/ckpt/wall-oss-flow"
pretrained_wallx_path: "/mnt/data/x2robot_v2/yangping/ckpt/wall-oss-flow"
# qwen_vl_act_config_path: "/mnt/data/x2robot_v2/yangping/github/wall-x/workspace/lerobot_example/qwen25_config.json"

save_path: "/mnt/data/x2robot_v2/yangping/ckpt/robochallenge_github/x2robot/pick_up_cups/"

qwen_vl_act_config_path: "/x2robot_v2/yangping/github/wall-x/workspace/model_config/mot_flash_mask_v_pred_x_loss.json"


resume:
  ckpt: /x2robot_v2/share/bus2507_plus/flow/ckpt/1_500000
  try_harder: true


# Torch Profile
profile: False
profile_save_path: ./profile/
profile_wait_iters: 10
profile_warmup_iters: 5
profile_active_iters: 2

# Training hyperparameters
num_warmup_steps: 100
num_training_steps: 64000000
learning_rate: 0.00005
min_lr: 0.00005
num_epoch: 100
gradient_accumulation_steps: 1
batch_size_per_gpu: 1
padding_side: left
epoch_save_interval: 1

# Robot configuration - Define degrees of freedom for each component
dof_config:
  follow_left_ee_cartesian_pos: 3      # Left end-effector Cartesian position
  follow_left_ee_rotation: 3           # Left end-effector rotation
  follow_left_gripper: 1               # Left gripper control
  follow_right_ee_cartesian_pos: 3     # Right end-effector Cartesian position
  follow_right_ee_rotation: 3          # Right end-effector rotation
  follow_right_gripper: 1              # Right gripper control
  head_actions: 2                      # Head/camera movement
  height: 1                            # Mobile base height control
  car_pose: 3                          # Mobile base pose (x, y, theta)

# Agent proprioception configuration (typically matches DOF config)
agent_pos_config:
  follow_left_ee_cartesian_pos: 3
  follow_left_ee_rotation: 3
  follow_left_gripper: 1
  follow_right_ee_cartesian_pos: 3
  follow_right_ee_rotation: 3
  follow_right_gripper: 1
  head_actions: 2
  height: 1
  car_pose: 3

norm_stats_path: "/x2robot_v2/yangping/github/norm/pick_up_cups/x2/norm_stats.json"

enable_customized_robot_config: true
customized_robot_config:
  name: "x2_normal"
  customized_dof_config:
    "action_all" : 20 #To match the total number of degrees of freedom

  customized_agent_pos_config:
    "state_all" : 20 #To match the total number of degrees of freedom

# Checkpoint resuming configuration
# resume:
#   ckpt: "/path/to/ckpt"
#   load_ckpt_only: false

# Data configuration

FSDP2: False
torch_compile: False

data:
  use_lerobot: true

  # LeRobot dataset configuration
  lerobot_config:
    repo_id: "x2_normal"
    root: "/mnt/data/x2robot_v2/yangping/data/lerobot/20250526-day-pick-up_cup-train"
    episodes: null
    image_transforms: null
    delta_timestamps: null
    tolerance_s: 1e-4
    revision: null
    force_cache_sync: false
    download_videos: true
    video_backend: null

  action_horizon: 32
  train_test_split: 0.95

  # Action keys for observation and prediction
  obs_action_keys:
    - follow_left_ee_cartesian_pos
    - follow_left_ee_rotation
    - follow_left_gripper
    - follow_right_ee_cartesian_pos
    - follow_right_ee_rotation
    - follow_right_gripper
    - head_actions
    - height
    - car_pose

  predict_action_keys:
    - follow_left_ee_cartesian_pos
    - follow_left_ee_rotation
    - follow_left_gripper
    - follow_right_ee_cartesian_pos
    - follow_right_ee_rotation
    - follow_right_gripper
    - head_actions
    - height
    - car_pose

  # Image resolution configuration for different camera views
  resolution:
    face_view: 256
    left_wrist_view: 256
    right_wrist_view: 256
    move1_view: 256
    move2_view: 256
    top_view: 256
    wall_view: 256
    multi_modal: 256
