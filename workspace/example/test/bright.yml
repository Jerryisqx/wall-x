# Training Configuration for Wall-X Robotic Multi-Modal Learning
# This configuration supports multi-modal learning with vision, language, and action data

# Model and paths configuration
log_name: "desk_distribute_fruits_jl-bus2507_plus_moe-0130"
log_project: "github_benchmark"
model_type: qwen2_5

use_fast_tokenizer: false
pretrained_wallx_path: "/x2robot_v2/Models/Qwen2.5-VL-3B-Instruct"
## 从model config中选模型
# qwen_vl_act_config_path: "/x2robot_v2/yangping/github/wall-x/workspace/model_config/mot_flash_mask_v_pred_x_loss.json"
# qwen_vl_act_config_path: "/x2robot_v2/yangping/github/wall-x/workspace/model_config/mot_flash.json"


resume:
  ckpt: /x2robot_v2/share/bus2602/pretrain_vq_delta_6d_eef_xloss_448_0214/ckpt_ddp_1/0_220000
  try_harder: true

# resume:
#   ckpt: /x2robot_v2/share/bus2507_plus/flow/ckpt/1_500000
#   try_harder: true

qwen_vl_act_config_path: "/mnt/data/x2robot_v2/yangping/github/jerry_git/wall-x/workspace/server/mot_flash_mask_causal_xloss.json"



seed: 10233
# seed: 10234

model_type: qwen2_5
processor_path: "/x2robot_v2/Models/Qwen2.5-VL-3B-Instruct"
pretrained_qwen_vl_path: "/x2robot_v2/Models/Qwen2.5-VL-3B-Instruct"  ## 以vlm的形式加载fast的模型


save_path: "/x2robot_v2/share/yangping/ckpt/robochallenge_github/bright/desk_distribute_fruits_jl/bus2602-220k"

# Torch Profile
profile: False
profile_save_path: ./profile/
profile_wait_iters: 10
profile_warmup_iters: 5
profile_active_iters: 2

# Training hyperparameters
num_warmup_steps: 1000
num_training_steps: 64000000
learning_rate: 0.0001
min_lr: 0.00005
num_epoch: 200
gradient_accumulation_steps: 8
batch_size_per_gpu: 8
padding_side: left
epoch_save_interval: 1

# Robot configuration - Define degrees of freedom for each component
dof_config:
  follow_left_ee_cartesian_pos_relative: 3
  follow_left_ee_rotation_6D_relative: 6
  follow_left_gripper: 1
  follow_right_ee_cartesian_pos_relative: 3
  follow_right_ee_rotation_6D_relative: 6
  follow_right_gripper: 1
  velocity_decomposed: 3
  height: 1
  head_actions: 2
# Agent proprioception configuration (typically matches DOF config)
agent_pos_config:
  follow_left_ee_cartesian_pos_relative: 3
  follow_left_ee_rotation_6D_relative: 6
  follow_left_gripper: 1
  follow_right_ee_cartesian_pos_relative: 3
  follow_right_ee_rotation_6D_relative: 6
  follow_right_gripper: 1
  velocity_decomposed: 3
  height: 1
  head_actions: 2
# norm_stats_path: "/x2robot_v2/yangping/github/norm/benchmark/libero/norm_stats.json"
norm_stats_path: "/mnt/data/x2robot_v2/yangping/github/jerry_git/wall-x/workspace/server/dataset_type2action_stats_fused_open_priority.json"
# customized_action_statistic_dof: "customized_action_statistic_dof"
min_key: q001
delta_key: delta_001

enable_customized_robot_config: true
customized_robot_config:
  name: "ex_normal"
  customized_dof_config:
    "action_left_ee_pos": 3        # Left arm end-effector position
    "action_left_ee_rot": 6        # Left arm end-effector rotation
    "action_left_gripper": 1       # Left gripper
    "action_right_ee_pos": 3       # Right arm end-effector position
    "action_right_ee_rot": 6       # Right arm end-effector rotation
    "action_right_gripper": 1      # Right gripper

  customized_agent_pos_config:
    "state_left_ee_pos": 3
    "state_left_ee_rot": 6
    "state_left_gripper": 1
    "state_right_ee_pos": 3
    "state_right_ee_rot": 6
    "state_right_gripper": 1


# Data configuration

FSDP2: False
torch_compile: False

data:
  use_lerobot: true

  # LeRobot dataset configuration
  lerobot_config:
    repo_id: "ex_normal"
    root: "/x2robot_v2/share/yangping/data/lerobot/bright/desk_distribute_fruits_jl"
    episodes: null
    image_transforms: null
    delta_timestamps: null
    tolerance_s: 1e-4
    revision: null
    force_cache_sync: false
    download_videos: true
    video_backend: null

  action_horizon: 32
  train_test_split: 0.95

  # Action keys for observation and prediction
  obs_action_keys:
    - follow_left_ee_cartesian_pos_relative
    - follow_left_ee_rotation_6D_relative
    - follow_left_gripper
    - follow_right_ee_cartesian_pos_relative
    - follow_right_ee_rotation_6D_relative
    - follow_right_gripper
    - velocity_decomposed
    - height
    - head_actions

  predict_action_keys:
    - follow_left_ee_cartesian_pos_relative
    - follow_left_ee_rotation_6D_relative
    - follow_left_gripper
    - follow_right_ee_cartesian_pos_relative
    - follow_right_ee_rotation_6D_relative
    - follow_right_gripper
    - velocity_decomposed
    - height
    - head_actions

  # Image resolution configuration for different camera views
  resolution:
    face_view: 256
    left_wrist_view: 256
    right_wrist_view: 256
    move1_view: 256
    move2_view: 256
    top_view: 256
    wall_view: 256
    multi_modal: 256
