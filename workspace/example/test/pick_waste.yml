# Training Configuration for Wall-X Robotic Multi-Modal Learning
# This configuration supports multi-modal learning with vision, language, and action data

# Model and paths configuration
log_name: "libero-bus2507_plus_mot-0130-scratch"
log_project: "github_benchmark"

use_fast_tokenizer: false
resume:
  ckpt: /x2robot_v2/share/yangping/release_ckpt/wall-oss-flow-v0.1
  try_harder: true

seed: 10233
model_type: qwen2_5
pretrained_wallx_path: "/x2robot_v2/Models/Qwen2.5-VL-3B-Instruct"
processor_path: "/x2robot_v2/Models/Qwen2.5-VL-3B-Instruct"
pretrained_qwen_vl_path: "/x2robot_v2/Models/Qwen2.5-VL-3B-Instruct"
qwen_vl_act_config_path: "/x2robot_v2/share/yangping/release_ckpt/wall-oss-flow-v0.1/config.json"


save_path: "/x2robot_v2/share/yangping/ckpt/robochallenge_github/benchmark/libero/bus2507_plus_mot-0130scratch"

# Torch Profile
profile: False
profile_save_path: ./profile/
profile_wait_iters: 10
profile_warmup_iters: 5
profile_active_iters: 2

# Training hyperparameters
num_warmup_steps: 1000
num_training_steps: 64000000
learning_rate: 0.00005
min_lr: 0.00001
num_epoch: 64
gradient_accumulation_steps: 2
batch_size_per_gpu: 8
padding_side: left
epoch_save_interval: 1

# Robot configuration - Define degrees of freedom for each component
dof_config:
  follow_left_ee_cartesian_pos: 3
  follow_left_ee_rotation: 3
  follow_left_gripper: 1
  follow_right_ee_cartesian_pos: 3
  follow_right_ee_rotation: 3
  follow_right_gripper: 1
  head_actions: 2
  height: 1
  velocity_decomposed: 3

# Agent proprioception configuration (typically matches DOF config)
agent_pos_config:
  follow_left_ee_cartesian_pos: 3
  follow_left_ee_rotation: 3
  follow_left_gripper: 1
  follow_right_ee_cartesian_pos: 3
  follow_right_ee_rotation: 3
  follow_right_gripper: 1
  head_actions: 2
  height: 1
  velocity_decomposed: 3

norm_stats_path: "/mnt/data/x2robot_v2/yangping/data/norm/benchmark/pick_waste/all_robots_action_stats.json"

enable_customized_robot_config: true
customized_robot_config:
  name: "pick_waste"
  customized_dof_config:
    "action_all" : 20 #To match the total number of degrees of freedom

  customized_agent_pos_config:
    "state_all" : 20 #To match the total number of degrees of freedom

# Data configuration

FSDP2: False
torch_compile: False

data:
  use_lerobot: true

  # LeRobot dataset configuration
  lerobot_config:
    repo_id: "pick_waste"
    root: "/x2robot_v2/share/yangping/data/lerobot/pick_waste"
    episodes: null
    image_transforms: null
    delta_timestamps: null
    tolerance_s: 1e-4
    revision: null
    force_cache_sync: false
    download_videos: true
    video_backend: null

  action_horizon: 32
  train_test_split: 0.95

  # Action keys for observation and prediction
  obs_action_keys:
  - follow_left_ee_cartesian_pos
  - follow_left_ee_rotation
  - follow_left_gripper
  - follow_right_ee_cartesian_pos
  - follow_right_ee_rotation
  - follow_right_gripper
  - head_actions
  - height
  - velocity_decomposed

  predict_action_keys:
  - follow_left_ee_cartesian_pos
  - follow_left_ee_rotation
  - follow_left_gripper
  - follow_right_ee_cartesian_pos
  - follow_right_ee_rotation
  - follow_right_gripper
  - head_actions
  - height
  - velocity_decomposed

  # Image resolution configuration for different camera views
  resolution:
    face_view: 256
    left_wrist_view: 256
    right_wrist_view: 256
    move1_view: 256
    move2_view: 256
    top_view: 256
    wall_view: 256
    multi_modal: 256
